  #     - name: run python test
  #       run: uv run python -m pytest

  # ******** test in docker container second *******
  integrate-and-test-docker-app:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: run docker compose
        env:
          MONGO_USERNAME: ${{secrets.MONGO_USERNAME}}
          MONGO_PASSWORD: ${{secrets.MONGO_PASSWORD}}
          MLFLOW_TRACKING_USERNAME: ${{secrets.MLFLOW_TRACKING_USERNAME}}
          MLFLOW_TRACKING_PASSWORD: ${{secrets.MLFLOW_TRACKING_PASSWORD}}
          DAGSHUB_USER_TOKEN: ${{secrets.DAGSHUB_USER_TOKEN}}
        run: docker compose up -d --build --wait

      - name: test the app
        run: |
          docker compose exec myapp uv run python -m pytest

  continous-delivery:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    needs: integrate-and-test-docker-app
    steps:
      - name: load the code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          audience: sts.amazonaws.com
          aws-region: eu-north-1
          role-to-assume: arn:aws:iam::285515884731:role/credit-approval-ecr

      - name: login to aws ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push to ECR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: 285515884731.dkr.ecr.eu-north-1.amazonaws.com/credit-approval:${{ github.sha }}

  continous-deployment:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    
    needs: continous-delivery
    steps:
      # - name: checkout
      #   uses: actions/checkout@v6

      - name: aws login
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          audience: sts.amazonaws.com
          aws-region: eu-north-1
          role-to-assume: arn:aws:iam::285515884731:role/credit-approval-ecr

      - name: login to aws ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: pull the docker image
        run: |
          docker pull 285515884731.dkr.ecr.eu-north-1.amazonaws.com/credit-approval:${{github.sha}}

      - name: run the container and remove old containers
        run: |
          docker stop credit-approval || true
          docker rm credit-approval || true
          docker run -d -p 8000:8000 \
          --name credit-approval \
          -e MONGO_USERNAME=${{secrets.MONGO_USERNAME}} \
          -e MONGO_PASSWORD=${{secrets.MONGO_PASSWORD}} \
          -e MLFLOW_TRACKING_USERNAME=${{secrets.MLFLOW_TRACKING_USERNAME}} \
          -e MLFLOW_TRACKING_PASSWORD=${{secrets.MLFLOW_TRACKING_PASSWORD}} \
          -e DAGSHUB_USER_TOKEN=${{secrets.DAGSHUB_USER_TOKEN}} \
          285515884731.dkr.ecr.eu-north-1.amazonaws.com/credit-approval:${{github.sha}}

      - name: health check
        id: check
        run: |
          for i in {1..10}; do
            curl -f http://localhost:8000/health && exit 0
            echo "waiting for the app..."
            sleep 3
          done

          echo "health check failed"
          exit 1

      - name: remove all images
        run: |
          docker image prune -f
