  #       uses: actions/checkout@v6

  #     - name: python installation
  #       uses: actions/setup-python@v6
  #       with:
  #         python-version: 3.13

  #     - name: install uv
  #       run: |
  #         python -m pip install --upgrade pip
  #         python -m pip install uv

  #     - name: install dependecies
